version: '3.8'

services:

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    hostname: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_scripts/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init_scripts/02_camunda.sql:/docker-entrypoint-initdb.d/02_camunda.sql
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: dwh_db
#      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d dwh_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

  # Elasticsearch (required by Camunda 8)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: elasticsearch
    hostname: elasticsearch
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

  # Zeebe (Camunda 8 Process Engine)
  zeebe:
    image: camunda/zeebe:8.2.0
    container_name: zeebe
    hostname: zeebe
    ports:
      - "26500:26500"  # gRPC
      - "9600:9600"    # HTTP
    volumes:
      - zeebe_data:/var/lib/zeebe
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_INDEX_PREFIX=zeebe-record
      - ZEEBE_BROKER_NETWORK_ADVERTISEDHOST=zeebe
      - ZEEBE_BROKER_GATEWAY_NETWORK_HOST=0.0.0.0
      - ZEEBE_BROKER_GATEWAY_NETWORK_PORT=26500
      - ZEEBE_BROKER_GATEWAY_LONGPOLLING_ENABLED=true
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9600/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

  # Camunda Operate (UI for Process Monitoring)
  operate:
    image: camunda/operate:8.2.0
    container_name: operate
    hostname: operate
    ports:
      - "8080:8080"
    volumes:
      - operate_data:/opt/operate/data
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_HOST=elasticsearch
      - CAMUNDA_OPERATE_ELASTICSEARCH_PORT=9200
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_SERVLET_CONTEXT_PATH=/operate
      - CAMUNDA_OPERATE_WEBAPP_LOGOUTURL=/
    depends_on:
      zeebe:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/operate/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

  # Camunda Tasklist (UI for User Tasks)
  tasklist:
    image: camunda/tasklist:8.2.0
    container_name: tasklist
    hostname: tasklist
    ports:
      - "8081:8080"
    volumes:
      - tasklist_data:/opt/tasklist/data
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_HOST=elasticsearch
      - CAMUNDA_TASKLIST_ELASTICSEARCH_PORT=9200
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_SERVLET_CONTEXT_PATH=/tasklist
      - CAMUNDA_TASKLIST_WEBAPP_LOGOUTURL=/
    depends_on:
      zeebe:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/tasklist/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camunda-network

