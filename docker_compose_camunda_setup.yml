version: '3.8'

services:
  zeebe:
    image: camunda/zeebe:8.7.0
    container_name: zeebe_broker
    ports:
      - "26500:26500"
      - "8080:8080"
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_INDEX_PREFIX=zeebe-record
    depends_on:
      - elasticsearch
    volumes:
      - zeebe_data:/usr/local/zeebe/data
    networks:
      - camunda-platform

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - camunda-platform

  operate:
    image: camunda/operate:8.7.0
    container_name: operate
    ports:
      - "8081:8080"
    environment:
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ZEEBE_RESTADDRESS=http://zeebe:8080
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - zeebe
      - elasticsearch
    networks:
      - camunda-platform

  tasklist:
    image: camunda/tasklist:8.7.0
    container_name: tasklist
    ports:
      - "8082:8080"
    environment:
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ZEEBE_RESTADDRESS=http://zeebe:8080
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - zeebe
      - elasticsearch
    networks:
      - camunda-platform

volumes:
  zeebe_data:
  elasticsearch_data:

networks:
  camunda-platform:
